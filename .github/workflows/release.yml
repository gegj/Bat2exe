name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build_release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        shell: cmd
        run: >-
          C:\Windows\Microsoft.NET\Framework64\v4.0.30319\csc.exe
          /nologo /target:winexe /out:Bat2exe.exe
          /reference:System.Windows.Forms.dll
          /reference:System.Drawing.dll
          /win32icon:bat2exe.ico
          /resource:bat2exe.ico,Bat2exe.Icon Bat2exe.cs

      - name: Create release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ github.ref_name }}" "Bat2exe.exe" --generate-notes --title "Bat2exe ${{ github.ref_name }}"
